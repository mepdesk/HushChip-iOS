<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#18181e"/>
      <stop offset="40%" stop-color="#131317"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>
    
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b254"/>
      <stop offset="20%" stop-color="#ccaa4e"/>
      <stop offset="50%" stop-color="#b8993e"/>
      <stop offset="80%" stop-color="#a68a35"/>
      <stop offset="100%" stop-color="#c4a44a"/>
    </linearGradient>
    
    <linearGradient id="chipHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="greyNoise"/>
      <feComponentTransfer in="greyNoise" result="faintNoise">
        <feFuncA type="linear" slope="0.07"/>
      </feComponentTransfer>
      <feBlend mode="overlay" in="SourceGraphic" in2="faintNoise"/>
    </filter>
    
    <filter id="chipGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="greyNoise"/>
      <feComponentTransfer in="greyNoise" result="faintNoise">
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend mode="soft-light" in="SourceGraphic" in2="faintNoise"/>
    </filter>

    <filter id="chipShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224"/>
    </clipPath>
    <clipPath id="chipClip">
      <rect x="222" y="270" width="340" height="240" rx="18"/>
    </clipPath>
    
    <linearGradient id="edgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="3%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>

  <!-- Full card background with grain -->
  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#cardGrad)"/>
    <rect width="1024" height="1024" fill="url(#cardGrad)" filter="url(#grain)"/>
    <rect width="1024" height="1024" fill="url(#edgeLight)"/>
  </g>

  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>

  <!-- EMV Chip - much bigger -->
  <g filter="url(#chipShadow)">
    <rect x="222" y="270" width="340" height="240" rx="18" fill="url(#chipGrad)"/>
  </g>
  
  <g clip-path="url(#chipClip)" filter="url(#chipGrain)">
    <rect x="222" y="270" width="340" height="240" fill="url(#chipGrad)"/>
  </g>
  
  <rect x="222" y="270" width="340" height="240" rx="18" fill="url(#chipHL)"/>
  <rect x="222" y="270" width="340" height="240" rx="18" fill="none" stroke="#8a7428" stroke-width="0.5" opacity="0.3"/>

  <!-- EMV contact pad lines -->
  <!-- Centre horizontal -->
  <line x1="250" y1="390" x2="534" y2="390" stroke="#9a832e" stroke-width="1.5" opacity="0.45"/>
  <!-- Centre vertical -->
  <line x1="392" y1="292" x2="392" y2="488" stroke="#9a832e" stroke-width="1.5" opacity="0.45"/>
  <!-- Left vertical -->
  <line x1="320" y1="300" x2="320" y2="480" stroke="#9a832e" stroke-width="1.2" opacity="0.3"/>
  <!-- Upper horizontal -->
  <line x1="255" y1="338" x2="529" y2="338" stroke="#9a832e" stroke-width="1.2" opacity="0.25"/>
  <!-- Lower horizontal -->
  <line x1="255" y1="442" x2="529" y2="442" stroke="#9a832e" stroke-width="1.2" opacity="0.25"/>

  <!-- "HUSH" text - same width as chip, more readable -->
  <text x="392" y="600" 
        font-family="Outfit, -apple-system, sans-serif" 
        font-weight="200" 
        font-size="68" 
        fill="rgba(255,255,255,0.15)" 
        letter-spacing="38" 
        text-anchor="middle">HUSH</text>
</svg>
